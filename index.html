<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveRates Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="aurora" aria-hidden="true"></div>

    <header class="site-header">
        <div class="header-inner">
            <div class="brand" id="brand" title="✨">
                <span class="brand-icon">📊</span>
                <span class="brand-name">LiveRates</span>
            </div>
            <div class="header-center">
                <span id="greeting" class="greeting"></span>
                <span id="pkClock" class="pk-clock"></span>
            </div>
            <div class="header-controls">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    LIVE
                </div>
                <span id="lastUpdated" class="last-updated"></span>
                <button id="refreshAll" class="btn-refresh" title="Press R">↻ Refresh</button>
            </div>
        </div>
    </header>

    <div class="ticker-bar" id="tickerBar" aria-hidden="true">
        <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <main class="dashboard">
        <section class="card span-2" id="card-crypto">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">₿</span>
                    <h2>Crypto Rates (PKR)</h2>
                </div>
                <button class="btn-icon" data-refresh="crypto" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="crypto-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-mood">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">🧭</span>
                    <h2>Market Mood</h2>
                </div>
                <button class="btn-icon" data-refresh="mood" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="mood-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-commodities">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">🏦</span>
                    <h2>Gold · Silver · Copper · Oil</h2>
                </div>
                <button class="btn-icon" data-refresh="commodities" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="commodities-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-cricket">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">🏏</span>
                    <h2>Cricket Scores</h2>
                </div>
                <button class="btn-icon" data-refresh="cricket" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="cricket-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-football">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">⚽</span>
                    <h2>FIFA World Cup 2026</h2>
                </div>
                <button class="btn-icon" data-refresh="football" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="football-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-movies">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">🎬</span>
                    <h2>Top 10 Movies</h2>
                </div>
                <button class="btn-icon" data-refresh="movies" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="movies-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>

        <section class="card" id="card-music">
            <div class="card-header">
                <div class="card-title-group">
                    <span class="card-icon">🎵</span>
                    <h2>Top 10 Songs</h2>
                </div>
                <button class="btn-icon" data-refresh="music" title="Refresh">↻</button>
            </div>
            <div class="card-content" id="music-content">
                <div class="loading-state"><div class="spinner"></div></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Auto-refreshes every 5 minutes &middot; Press <kbd>R</kbd> to refresh &middot; Market data may be delayed up to 15 minutes</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
